name: ${COMPOSE_PROJECT_NAME:-ticket-system}

# =====================================================================
# Produccion detras de Traefik (TLS + Let's Encrypt en el contenedor
# Traefik que corre aparte y expone la red externa `traefik-proxy`).
#
# Un solo contenedor de app (NestJS) sirve la API (/api), la SPA del
# frontend y los uploads (/api/uploads). Todo en un unico dominio.
#
# Para correr en LOCAL sin Traefik:
#   docker compose -f docker-compose.local.yml up -d --build
# =====================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-ticket-system}-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net
    # La DB queda SOLO en la red interna: nunca se expone a Traefik ni al host.

  app:
    build:
      context: .
      dockerfile: Dockerfile
      # El front se hornea con VITE_API_URL=/api (default del Dockerfile):
      # mismo dominio que la SPA, sin CORS, misma imagen para todos los clientes.
    container_name: ${COMPOSE_PROJECT_NAME:-ticket-system}-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      # DB (apunta al servicio "db" de la red interna)
      TYPEORM_CONNECTION: postgres
      TYPEORM_HOST: db
      TYPEORM_PORT: 5432
      TYPEORM_DATABASE: ${POSTGRES_DB}
      TYPEORM_USERNAME: ${POSTGRES_USER}
      TYPEORM_PASSWORD: ${POSTGRES_PASSWORD}
      TYPEORM_SYNCHRONIZE: ${TYPEORM_SYNCHRONIZE:-true}
      # Auth / JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-3600s}
      # Mailer
      MAILER_HOST: ${MAILER_HOST}
      MAILER_PORT: ${MAILER_PORT}
      MAILER_USER: ${MAILER_USER}
      MAILER_PASS: ${MAILER_PASS}
      # WhatsApp
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      # Google OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      # Mercado Pago (app OAuth global de la plataforma)
      MP_OAUTH_CLIENT_ID: ${MP_OAUTH_CLIENT_ID}
      MP_OAUTH_CLIENT_SECRET: ${MP_OAUTH_CLIENT_SECRET}
      # URLs publicas (un solo dominio; la API va bajo /api)
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL}
      BASE_PUBLIC_URL: ${BASE_PUBLIC_URL}
      # Uploads (volumen persistente)
      MULTER_DEST: /app/uploads
    volumes:
      - backend-uploads:/app/uploads
    networks:
      - app-net
      - traefik-proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-proxy
      # Toda la app (SPA + API + uploads) en un unico dominio.
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${TRAEFIK_HOST}`)
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=letsencrypt
      - traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=3000

networks:
  app-net:
    driver: bridge
    name: ${COMPOSE_PROJECT_NAME:-ticket-system}-net
  traefik-proxy:
    external: true

volumes:
  postgres-data:
  backend-uploads:
