name: ${COMPOSE_PROJECT_NAME:-el-castillo}-local

# =====================================================================
# Desarrollo LOCAL sin Traefik. Publica el frontend en el host y rutea
# /api y /uploads al backend via nginx (mismo esquema path-based de
# siempre). Levantar con:
#   docker compose -f docker-compose.local.yml up -d --build
# Frontend: http://localhost  (o FRONTEND_PORT)
# =====================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-el-castillo}-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # Descomenta para conectarte con psql/DBeaver desde el host.
    # ports:
    #   - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-el-castillo}-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      TYPEORM_CONNECTION: postgres
      TYPEORM_HOST: db
      TYPEORM_PORT: 5432
      TYPEORM_DATABASE: ${POSTGRES_DB}
      TYPEORM_USERNAME: ${POSTGRES_USER}
      TYPEORM_PASSWORD: ${POSTGRES_PASSWORD}
      TYPEORM_SYNCHRONIZE: ${TYPEORM_SYNCHRONIZE:-true}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-3600s}
      MAILER_HOST: ${MAILER_HOST}
      MAILER_PORT: ${MAILER_PORT}
      MAILER_USER: ${MAILER_USER}
      MAILER_PASS: ${MAILER_PASS}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      MP_OAUTH_CLIENT_ID: ${MP_OAUTH_CLIENT_ID}
      MP_OAUTH_CLIENT_SECRET: ${MP_OAUTH_CLIENT_SECRET}
      # En local forzamos URLs localhost (ignoramos las de prod del .env) para
      # que CORS y las URLs de uploads funcionen sin tocar nada. Asume el
      # frontend en el puerto 80; ajusta si cambias FRONTEND_PORT.
      FRONTEND_URL: http://localhost
      BACKEND_URL: http://localhost
      BASE_PUBLIC_URL: http://localhost
      MULTER_DEST: /app/uploads
    volumes:
      - backend-uploads:/app/uploads
    # Descomenta para pegarle al backend directo (sin pasar por nginx).
    # ports:
    #   - "${BACKEND_PORT:-3000}:3000"
    networks:
      - app-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # En local SIEMPRE path-based via nginx (ignora el VITE_API_URL del
        # .env, que apunta al subdominio de prod).
        VITE_API_URL: /api
    container_name: ${COMPOSE_PROJECT_NAME:-el-castillo}-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
    name: ${COMPOSE_PROJECT_NAME:-el-castillo}-net

volumes:
  postgres-data:
  backend-uploads:
